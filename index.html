<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preload" as="image" href="./images/img3.png" />
    <link rel="preload" as="image" href="./images/image.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cagliostro&family=Calligraffitti&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="icon1">
      <i class="fa-solid fa-burger" style="color: #ffffff; padding: 4px"></i>
    </div>
    <div id="center_box">
      <div id="headings">
        <h1>Profile Card Generator</h1>
        <p>-create, download and share...</p>
      </div>
      <div id="boxes">
        <div class="box" id="box1">
          <p>Profile Details</p>
          <form action="">
            <div id="selection">
              <select name="gender" id="gender_select">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
            <input
              type="text"
              name="username"
              required
              placeholder="Enter Username/Title"
              id="field1"
            />
            <input
              type="text"
              name="short"
              required
              placeholder="Enter Short Intro"
              id="field2"
            />
            <textarea
              name="bio"
              placeholder="Enter Bio"
              id="field3"
              required
            ></textarea>
            <input
              type="text"
              required
              name="contact"
              placeholder="Contact or Email"
              id="field4"
            />
            <button id="button1" required type="submit">
              Generate Profile Card
            </button>
          </form>
        </div>
        <div class="box" id="box2">
          <div>
            <img id="logo" alt="logo" />
          </div>
          <h1>Xyz</h1>
          <h4>Xyz</h4>
          <p>
            Lorem, ipsum dolor sit amet consectetur adipisicing elit. Doloribus
            minima dolorum numquam eos repellat consectetur animi nemo
            cupiditate impedit laudantium labore praesentium ipsa provident?
            Amet, architecto.
          </p>
          <p id="box2_contact">Xyz</p>
        </div>
        <div id="options">
          <button id="download">
            <i class="fa-solid fa-download" style="color: #000000"></i>
          </button>
          <button id="copy">
            <i class="fa-solid fa-copy" style="color: #000000"></i>
          </button>
        </div>
      </div>
    </div>
    <script src="html2canvas.min.js"></script>
    <script src="download.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
